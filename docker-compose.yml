# Production-grade PostgreSQL with the pgvector extension.
# Usage:
#   docker compose up -d pgvector
#   OIA_VECTOR_STORE=pgvector OIA_DATABASE_URL=postgresql+asyncpg://ops:ops@localhost:5432/ops uv run uvicorn ops_intel_agent.main:app
services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: ops-intel-pgvector
    environment:
      POSTGRES_USER: ops
      POSTGRES_PASSWORD: ops
      POSTGRES_DB: ops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ops"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
