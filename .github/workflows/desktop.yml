name: Desktop Build & Release

# 编译桌面应用并在打 tag 时自动发版。
#   - push 到 main / PR：4 平台矩阵构建，产物作为 workflow artifact 上传（供下载验证）。
#   - push tag v*：同样构建，再把各平台包附加到 GitHub Release。
#   - workflow_dispatch：手动触发。
#
# 注意：Nuitka 不能交叉编译，所以每个目标平台必须在该平台的 runner 上构建。

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# softprops/action-gh-release 需要写权限才能创建/更新 Release
permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-latest
          - platform: macos-x86_64
            runner: macos-13
          - platform: linux
            runner: ubuntu-22.04
          - platform: windows
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      # ── 系统依赖（仅 Linux 需要 webkit 等 GUI 库）──────────────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            patchelf libssl-dev libxdo-dev

      # Nuitka 在 Windows 的 standalone/onefile 模式必须用 Dependency Walker
      # 解析 DLL 依赖（runner 不自带）。choco 包安装 depends.exe 到 PATH。
      - name: Install Dependency Walker (Windows, required by Nuitka standalone)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install dependencywalker -y --no-progress

      # ── 工具链 ───────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      # npm 版 tauri CLI 是预编译二进制，比 `cargo install tauri-cli` 快几分钟
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      # ── 构建 ─────────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Sync Python dependencies
        run: uv sync

      - name: Build backend sidecar (Nuitka --standalone)
        run: uv run --with nuitka scripts/build_backend.py

      - name: Build Tauri app
        run: tauri build
        # `tauri build` 会运行 beforeBuildCommand（npm run build）→ 编译 Rust → 打包。
        # sidecar 已由上一步放进 src-tauri/binaries/，会被 bundle.resources 打入。

      # ── 产物（CI：上传 workflow artifact）──────────────────────────────────
      - name: Upload bundle artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ops-intel-agent-${{ matrix.platform }}
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage

      # ── 发版（tag：附加到 GitHub Release）─────────────────────────────────
      - name: Attach bundles to GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
          generate_release_notes: true
          # 每个平台只产自己的包（mac→dmg、win→msi/exe、linux→deb/AppImage），
          # 跨平台 glob 在非目标平台上必然不匹配，故不能因不匹配而失败。
          fail_on_unmatched_files: false
